<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>task-board — LINE Pay Thailand</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0D1117;
  --surface:#161B22;
  --text:#C9D1D9;
  --dim:#484F58;
  --muted:#8B949E;
  --border:#30363D;
  --blue:#58A6FF;
  --red:#F85149;
  --amber:#D29922;
  --green:#3FB950;
  --purple:#BC8CFF;
  --gray:#8B949E;
}
html{font-size:13px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  line-height:1.6;
  padding:1lh 2ch;
  max-width:80ch;
  margin:0 auto;
}

/* everything is text output — no boxes, no panels */
.prompt{color:var(--muted)}
.cmd{color:var(--text)}
.accent{color:var(--blue)}
.dim{color:var(--dim)}
.muted{color:var(--muted)}

/* summary line */
.summary{
  margin:0.5lh 0 1lh;
  font-size:0.85rem;
}

/* filter — styled as command prompt, not buttons */
.filter-line{
  margin-bottom:1lh;
  font-size:0.85rem;
}
.filter-line .f-opt{
  color:var(--dim);
  cursor:pointer;
  padding:0 2px;
  transition:color .1s;
}
.filter-line .f-opt:hover{color:var(--muted)}
.filter-line .f-opt.active{color:var(--bg);background:var(--text)}

/* section dividers — ANSI-style, no markdown */
.section-head{
  margin-top:1.5lh;
  margin-bottom:0.25lh;
  font-size:0.85rem;
  padding-bottom:0.125lh;
}
.section-head .owner{color:var(--text);font-weight:700;text-decoration:underline;text-underline-offset:2px}
.section-head .count{color:var(--dim);font-weight:400}

.sub-head{
  color:var(--dim);
  font-size:0.8rem;
  margin:1lh 0 0.25lh;
}

/* task rows — pure text, no boxes */
.task{
  padding:2px 0;
  font-size:0.85rem;
  cursor:pointer;
}

.task .num{
  display:inline-block;
  width:3ch;
  text-align:right;
  color:var(--dim);
  margin-right:1ch;
}

.task .status{font-weight:700;display:inline-block;width:11ch}
.s-not-yet{color:var(--red)}
.s-in-plan{color:var(--amber)}
.s-in-dev{color:var(--green)}
.s-in-qa{color:var(--purple)}
.s-done{color:var(--gray)}

.task .name{color:var(--text)}
.task .target{color:var(--muted);margin-left:8px}

/* detail — indented tree lines, always toggled via click */
.detail{
  display:none;
  color:var(--muted);
  font-size:0.8rem;
  padding-left:4ch;
}
.detail .tree{color:var(--dim)}
.detail .val{color:var(--text)}
.task.open .detail{display:block}

/* empty */
.empty{color:var(--dim);font-size:0.8rem;padding-left:4ch}

/* footer */
.footer{
  margin-top:1.5lh;
  padding-top:0.25lh;
  /* no px borders — terminal uses text separators */
  color:var(--dim);
  font-size:0.75rem;
}
</style>
</head>
<body>

<div class="prompt">$ <span class="cmd">task-board</span> <span class="muted">--project</span> <span class="accent">line-pay-th</span> <span class="muted">--mode</span> pm</div>
<div class="summary" id="summary"></div>
<div class="filter-line" id="filterLine"></div>
<div id="output"></div>
<div class="footer"><span class="dim">────────────────────────────────────────</span></div>
<div class="footer">$ <span class="muted">exit 0</span></div>

<script>
const TASKS=[
{p:"David",s:"Key Tasks",n:1,name:"New Point Card",st:"IN PLAN",t:"2026-08",g:"Release new Kbank point card",k:"Card AU 100,000",notes:["Under schedule fix with Kbank","├─ dependency with report file format","├─ need to check NEON I/F","└─ finalize UX flow"]},
{p:"David",s:"Key Tasks",n:2,name:"Core Separation — Risk Management",st:"IN DEV",t:"2026-05",g:"Separate risk mgmt with LIAM admin",k:"On-time delivery",notes:["Under schedule fix","├─ DB release: done","├─ RC QA: 3rd–4th week April","└─ Go-live: May 2026"]},
{p:"David",s:"Key Tasks",n:3,name:"Core Separation — Payfac/Cobrand/Salmon",st:"IN DEV",t:"2026-04",g:"Separate payfac/cobrand/salmon",k:"On-time delivery",notes:["Cobrand IP: beta done, real TBD","├─ Domain: TBD","└─ Salmon: decided not to proceed"]},
{p:"David",s:"Key Tasks",n:4,name:"Core Separation — Settlement",st:"IN PLAN",t:"2026-06",g:"Separate settlement with LIAM admin",k:"On-time delivery",notes:["Under review schedule","└─ whether to include in central migration"]},
{p:"David",s:"Key Tasks",n:5,name:"Core Separation — Central",st:"NOT YET",t:"2026-09",g:"Separate central payment system",k:"On-time delivery",notes:null},
{p:"David",s:"Key Tasks",n:6,name:"Cross-Border Payment",st:"IN PLAN",t:"2026-07",g:"Apply traveler component",k:"On-time delivery",notes:["Need to push LPP","└─ suggest sustain current regkey payment"]},
{p:"David",s:"Key Tasks",n:7,name:"Apple Hub",st:"IN QA",t:"2026-04",g:"Gaining LINE Pay GMV from Apple Store",k:"TBD",notes:["Need to finish Apple QA","└─ related to mobile security banking features"]},
{p:"David",s:"Key Tasks",n:8,name:"Adding UTS for Binding Flow",st:"IN PLAN",t:"2026-05",g:"Know drop-off rate",k:"On-time delivery",notes:["Screen view: done","├─ will add events","├─ workflow check: done","└─ might check by server API data"]},
{p:"David",s:"Key Tasks",n:9,name:"BIN Switching",st:"IN PLAN",t:"2026 Q4",g:"Auto-select cheaper MDR",k:"Reduce 6M THB/year",notes:["Gaining requirement from commercial team","└─ need to discuss with core payment engineers"]},
{p:"David",s:"Key Tasks",n:10,name:"SAP Migration",st:"IN PLAN",t:"2027 Q1",g:"Migration NEON → Accounting Hub",k:"On-time delivery",notes:["└─ check schedule with accounting team"]},
{p:"David",s:"Key Tasks",n:11,name:"Merchant Squad Sprint",st:"IN PLAN",t:"2026-04",g:"Sprint-based production",k:"On-time delivery",notes:["└─ discussion with Chris & Som"]},
{p:"David",s:"Key Tasks",n:12,name:"UX/UI Design Onboarding",st:"IN PLAN",t:"2026-04",g:"UX/UI workflow LPP → LPK",k:"TBD",notes:null},
{p:"David",s:"Security Reviews",n:1,name:"Allow getUserInfo API for OpenAI",st:"DONE",t:null,g:null,k:null,notes:null},
{p:"David",s:"Security Reviews",n:2,name:"Merchant LIAM menu permissions",st:"DONE",t:null,g:null,k:null,notes:null},
{p:"Nuri",s:"Key Tasks",n:1,name:"WebKYC",st:"IN PLAN",t:null,g:null,k:null,notes:null},
{p:"Nuri",s:"Key Tasks",n:2,name:"BNPL Onboarding",st:"IN PLAN",t:null,g:null,k:null,notes:null},
{p:"Nuri",s:"Key Tasks",n:3,name:"Wallet Passthrough",st:"IN PLAN",t:null,g:null,k:null,notes:null},
{p:"Nuri",s:"Key Tasks",n:4,name:"Payment Binding Flow",st:"IN PLAN",t:null,g:null,k:null,notes:null},
{p:"Nuri",s:"Key Tasks",n:5,name:"Risk Management Service",st:"IN PLAN",t:null,g:null,k:null,notes:null},
];

const STS=["NOT YET","IN PLAN","IN DEV","IN QA","DONE"];
const SC={"NOT YET":"s-not-yet","IN PLAN":"s-in-plan","IN DEV":"s-in-dev","IN QA":"s-in-qa","DONE":"s-done"};
const SL={"NOT YET":"NOT_YET","IN PLAN":"IN_PLAN","IN DEV":"IN_DEV","IN QA":"IN_QA","DONE":"DONE"};

// total counts
const TC={};
STS.forEach(s=>{TC[s]=TASKS.filter(t=>t.st===s).length});

// summary
document.getElementById('summary').innerHTML=
  STS.map(s=>`<span class="${SC[s]}">[${SL[s]}:${String(TC[s]).padStart(2,'0')}]</span>`).join(' ')+
  ` <span class="muted">total:${TASKS.length}</span>`;

// filter
let F="ALL";
function renderFilter(){
  const fl=document.getElementById('filterLine');
  const opts=["ALL",...STS];
  fl.innerHTML='<span class="prompt">$ filter</span> '+opts.map(o=>{
    const label=o==="ALL"?"--all":`--${SL[o]||o}`.toLowerCase();
    const cls=o===F?'f-opt active':'f-opt';
    return `<span class="${cls}" data-f="${o}">${label}</span>`;
  }).join(' ');
  fl.querySelectorAll('.f-opt').forEach(el=>{
    el.addEventListener('click',()=>{F=el.dataset.f;renderFilter();renderOutput()});
  });
}

function renderOutput(){
  const out=document.getElementById('output');
  out.innerHTML='';
  const persons=[...new Set(TASKS.map(t=>t.p))];
  persons.forEach(person=>{
    const pt=TASKS.filter(t=>t.p===person);
    const sections=[...new Set(pt.map(t=>t.s))];

    const h=document.createElement('div');
    h.className='section-head';
    h.innerHTML=`<span class="owner">${person}</span> <span class="count">${pt.length} tasks</span>`;
    out.appendChild(h);

    sections.forEach(sec=>{
      let tasks=pt.filter(t=>t.s===sec);
      if(F!=="ALL") tasks=tasks.filter(t=>t.st===F);
      if(tasks.length===0) return;

      const sh=document.createElement('div');
      sh.className='sub-head';
      sh.textContent=sec.toLowerCase().replace(/ /g,'_');
      out.appendChild(sh);

      tasks.forEach(task=>{
        const row=document.createElement('div');
        row.className='task';
        const cls=SC[task.st]||'';
        row.innerHTML=`<span class="num">${task.n}.</span><span class="status ${cls}">[${SL[task.st]}]</span> <span class="name">${esc(task.name)}</span>${task.t?` <span class="target">${task.t}</span>`:''}`;

        const hasDetail=task.g||task.k||task.notes;
        if(hasDetail){
          const d=document.createElement('div');
          d.className='detail';
          let lines=[];
          if(task.g) lines.push(`<span class="tree">├─</span> goal: <span class="val">${esc(task.g)}</span>`);
          if(task.k) lines.push(`<span class="tree">${task.notes?'├─':'└─'}</span> kpi:  <span class="val">${esc(task.k)}</span>`);
          if(task.notes) task.notes.forEach((n,i)=>{
            lines.push(`<span class="tree">${i===task.notes.length-1&&!task.g&&!task.k?'└─':'│ '}</span> <span class="val">${esc(n)}</span>`);
          });
          d.innerHTML=lines.join('<br>');
          row.appendChild(d);
          row.addEventListener('click',()=>row.classList.toggle('open'));
        }

        out.appendChild(row);
      });
    });
  });
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

renderFilter();
renderOutput();
</script>
</body>
</html>
